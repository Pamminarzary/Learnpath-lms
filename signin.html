<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | LearnPath LMS</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-8px); }
      40%,80% { transform: translateX(8px); }
    }
  </style>
</head>
<body>

<header class="navbar">
  <a href="landing.html" class="nav-left">
    <img src="assets/images/logo.png" alt="LMS Logo" class="nav-logo">
    <span class="nav-title">LearnPath</span>
  </a>
  <nav class="nav-links">
    <a href="landing.html">Home</a>
    <a href="dashboard.html">Courses</a>
  </nav>
  <div class="nav-actions">
    <button onclick="toggleTheme()" class="theme-toggle" title="Toggle theme">🌙</button>
  </div>
</header>

<div class="auth-page">
  <div class="auth-card" id="authCard">
    <img src="assets/images/logo.png" class="auth-logo" alt="LMS Logo">
    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to continue your learning journey.</p>

    <div class="auth-error" id="authError"></div>

    <div class="form-group">
      <label for="email">Email address</label>
      <input type="text" id="email" placeholder="you@example.com" autocomplete="off">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="off">
    </div>

    <button onclick="login()" class="btn btn-primary auth-submit" id="loginBtn">Sign In</button>

    <p class="auth-link">
      New here? <a href="signup.html">Create a free account</a>
    </p>
  </div>
</div>

<footer class="footer">
  <div class="footer-bottom" style="padding-top:0;border:none;justify-content:center;">
    <span>© 2026 LearnPath | Built by Pammi Narzary</span>
  </div>
</footer>

<script src="js/main.js"></script>
<script>
function showError(msg) {
  var el = document.getElementById('authError');
  el.textContent = msg;
  el.classList.add('show');
  var card = document.getElementById('authCard');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'shake 0.4s ease';
}

function login() {
  document.getElementById('authError').classList.remove('show');

  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('password').value;
  var btn   = document.getElementById('loginBtn');

  if (!email || !pass) {
    showError('Please enter your email and password.');
    return;
  }

  var saved = null;
  try { saved = JSON.parse(localStorage.getItem('user')); } catch(e) {}

  if (saved && email === saved.email && pass === saved.password) {
    localStorage.setItem('loggedIn', 'true');
    localStorage.setItem('userName', saved.name);
    btn.textContent = '✓ Signing in...';
    btn.disabled = true;
    btn.style.opacity = '0.75';
    setTimeout(function() { window.location.href = 'dashboard.html'; }, 600);
  } else {
    showError(!saved
      ? 'No account found. Please sign up first.'
      : 'Incorrect password. Please try again.');
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
